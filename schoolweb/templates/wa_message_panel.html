{% load static %}
<!-- WhatsApp Message Section -->
<div id="waMessageSection" style="display: none; width: 100%; height: 100%; overflow: auto; padding: 20px; box-sizing: border-box;">
    <div class="bonafide-header">WhatsApp Custom Message</div>
    
    <div class="wa-tabs">
        <button class="wa-tab-btn active" onclick="switchWATab('single')">Single Message</button>
        <button class="wa-tab-btn" onclick="switchWATab('bulk')">Bulk Message</button>
    </div>

    <!-- Single Message View -->
    <div id="wa-single-view">
        <div style="max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);">
            <div class="control-row">
                <input type="text" id="wa_student_id" class="textBoxClass" placeholder="Student ID" style="flex: 1;">
                <button type="button" class="sidebar-link active" onclick="getStudentMobile()">Fetch Mobile</button>
            </div>
            <div class="bonafide-form-row">
                <label class="fee-label-styled" style="width: 120px;">Mobile Number</label>
                <input type="text" id="wa_mobile" class="textBoxClass" placeholder="Mobile Number" style="flex: 1;">
            </div>
            <div class="bonafide-form-row" style="align-items: flex-start;">
                <label class="fee-label-styled" style="width: 120px; margin-top: 10px;">Message</label>
                <textarea id="wa_custom_msg" class="textBoxClass" rows="6" style="flex: 1; height: auto; padding: 10px;" placeholder="Compose your message here..."></textarea>
            </div>
            <div class="action-buttons">
                <button type="button" class="sidebar-link active" onclick="sendCustomWA()">Send Message</button>
            </div>
        </div>
    </div>

    <!-- Bulk Message View -->
    <div id="wa-bulk-view" style="display: none; max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);">
        <div class="bonafide-search-row">
            <select id="wa_bulk_std" class="textBoxClass" style="flex: 1;">
                <option value="">Select Standard for Bulk Message</option>
                {% for s in standards %}
                    <option value="{{ s.0 }}">{{ s.1 }}</option>
                {% endfor %}
            </select>
            <button type="button" class="sidebar-link active" onclick="getBulkStudents()">Fetch Students</button>
        </div>
        <div id="wa-bulk-list-container" style="max-height: 250px; overflow-y: auto; background: var(--card-bg); border: 1px solid var(--border-color); padding: 10px; margin-bottom: 20px; display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;">
                <b>Recipients</b>
                <label style="font-size: 0.9em; cursor: pointer;"><input type="checkbox" onchange="toggleAllWA(this)"> Select All</label>
            </div>
            <div id="wa-bulk-list"></div>
        </div>
        <div class="bonafide-form-row" style="align-items: flex-start;">
            <label class="fee-label-styled" style="width: 120px; margin-top: 10px;">Bulk Message</label>
            <textarea id="wa_bulk_msg" class="textBoxClass" rows="6" style="flex: 1; height: auto; padding: 10px;" placeholder="Compose message for multiple students..."></textarea>
        </div>
        <div class="action-buttons">
            <button type="button" class="sidebar-link active" onclick="sendBulkWA()">Send Bulk Message</button>
        </div>
    </div>
</div>

<script>
var _E=i=>document.getElementById(i),_S=q=>document.querySelectorAll(q),_P=(m,t)=>SchoolUtils.showPopup(m,t),_F=(u,b)=>fetch(u,{method:"POST",headers:{"Content-Type":"application/json","X-CSRFToken":"{{ csrf_token }}"},body:JSON.stringify(b)});
function switchWATab(t){let s=_E('wa-single-view'),b=_E('wa-bulk-view'),n=_S('.wa-tab-btn');if(t==='single'){s.style.display='block';b.style.display='none';n[0].classList.add('active');n[1].classList.remove('active')}else{s.style.display='none';b.style.display='block';n[0].classList.remove('active');n[1].classList.add('active')}}
function getBulkStudents(){let s=_E('wa_bulk_std').value;if(!s)return _P("Please select a standard","error");_F("{% url 'student_get' %}",{planner_pk:"Bulk",planner_sk:s}).then(r=>r.json()).then(d=>{if(d.success&&d.students){let l=_E('wa-bulk-list'),c=_E('wa-bulk-list-container');l.innerHTML='';if(d.students.length===0){_P("No students found for this standard.","error");c.style.display='none';return}d.students.forEach(s=>{if(s.mobile){let r=document.createElement('div');r.className='fee-entry-row';r.style.justifyContent='flex-start';r.style.gap='15px';r.innerHTML=`<input type="checkbox" class="wa-bulk-check" value="${s.mobile}"><div style="flex: 1; text-align: left;"><b>${s.name}</b> (${s.planner_sk})</div><div style="color: #666; font-size: 0.9em;">${s.mobile}</div>`;l.appendChild(r)}});c.style.display='block'}else _P("Error: "+(d.error||"Failed to fetch students"),"error")}).catch(e=>_P("Error: "+e,"error"))}
function toggleAllWA(m){_S('.wa-bulk-check').forEach(c=>c.checked=m.checked)}
function sendBulkWA(){let m=_E('wa_bulk_msg').value,s=_S('.wa-bulk-check:checked');if(s.length===0||!m)return _P("Please select recipients and enter a message.","error");if(!confirm(`This will attempt to open ${s.length} WhatsApp tabs. Continue?`))return;s.forEach((c,i)=>{setTimeout(()=>{window.open(`https://wa.me/91${c.value}?text=${encodeURIComponent(m)}`,'_blank')},i*1500)})}
function getStudentMobile(){let s=_E('wa_student_id').value;if(!s)return _P("Please enter a Student ID","error");_F("{% url 'student_get' %}",{planner_pk:"Student",planner_sk:s}).then(r=>r.json()).then(d=>{if(d.user_info)_E('wa_mobile').value=d.user_info.mobile||'';else _P("Student not found.","error")}).catch(e=>_P("Error fetching student: "+e,"error"))}
function sendCustomWA(){let m=_E('wa_mobile').value,s=_E('wa_custom_msg').value;if(!m||!s)return _P("Please provide both mobile number and message.","error");_F("{% url 'send_whatsapp' %}",{mobile:m,message:s}).then(r=>r.json()).then(d=>{if(d.success)window.open(d.whatsapp_url,'_blank');else _P("Error: "+d.error,"error")}).catch(e=>_P("An error occurred: "+e,"error"))}
</script>
