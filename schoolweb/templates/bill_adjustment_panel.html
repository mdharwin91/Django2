{% load static %}
<!-- Bill Adjustment Section -->
<div id="billAdjustment" style="display: none; width: 100%; height: 100%; overflow: auto;">
    <div class="fee-adjust-wrapper">
        <div class="fee-left-panel">
            <div class="panel-header">Bill Search</div>
            <div class="control-row" style="display: flex !important; flex-direction: row !important; gap: 10px !important; margin-bottom: 12px;">
                <input type="text" id="adj_student_id" class="textBoxClass" placeholder="Student ID" style="flex: 1 !important; width: 0 !important; min-width: 0 !important; height: 40px !important; box-sizing: border-box !important;">
                <button type="button" class="sidebar-link active" style="flex: 1 !important; width: 0 !important; min-width: 0 !important; margin: 0 !important; height: 40px !important; box-sizing: border-box !important; padding: 0 !important;" onclick="getStudentBills()">Fetch</button>
                <button type="button" class="sidebar-link active" style="flex: 1 !important; width: 0 !important; min-width: 0 !important; margin: 0 !important; height: 40px !important; box-sizing: border-box !important; padding: 0 !important; background: #6c757d;" onclick="resetBillAdjustment()">Clear</button>
            </div>
            <div id="adj-fetch-name-display" style="display: none; margin: -8px 0 15px 5px; font-weight: bold; color: var(--panel-header); font-size: 0.95em;">
                <span style="opacity: 0.7;">Selected:</span> <span id="adj-display-fetch-name"></span>
            </div>
            <div id="adj-bill-list" style="margin-top: 20px; flex: 1; overflow-y: auto;">
                <!-- Bill list will appear here -->
            </div>
        </div>
        <div class="fee-right-panel">
            <div class="panel-header">Edit Bill Details</div>
            <div id="adj-edit-form" style="display: none; background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color);"></div>
            <div id="adj-placeholder" style="text-align: center; margin-top: 100px; color: var(--text-main); opacity: 0.5;">Enter Student ID and click Fetch to see payment history.</div>
        </div>
    </div>
</div>

<script>
    let currentAdjStudent = null;
    let currentBillIndex = -1;

    function resetBillAdjustment() {
        document.getElementById('adj_student_id').value = '';
        document.getElementById('adj-display-fetch-name').innerText = '';
        document.getElementById('adj-fetch-name-display').style.display = 'none';
        document.getElementById('adj-bill-list').innerHTML = '';
        document.getElementById('adj-edit-form').style.display = 'none';
        document.getElementById('adj-placeholder').style.display = 'block';
        currentAdjStudent = null;
        currentBillIndex = -1;
    }

    function getStudentBills() {
        const sid = document.getElementById('adj_student_id').value;
        if (!sid) { SchoolUtils.showPopup("Please enter a Student ID", "error"); return; }
        
        fetch("{% url 'student_get' %}", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
            body: JSON.stringify({ planner_pk: "Student", planner_sk: sid })
        })
        .then(res => res.json())
        .then(data => {
            if (data.user_info) {
                currentAdjStudent = data.user_info;
                document.getElementById('adj-display-fetch-name').innerText = currentAdjStudent.name || '';
                document.getElementById('adj-fetch-name-display').style.display = 'block';

                const container = document.getElementById('adj-bill-list');
                container.innerHTML = '<h4 style="margin-bottom:10px; color:var(--panel-header);">Payment History</h4>';
                
                if (!currentAdjStudent.fees_paid || currentAdjStudent.fees_paid.length === 0) {
                    container.innerHTML += '<p style="color:var(--text-main); opacity: 0.7; font-style:italic;">No payments found.</p>';
                    return;
                }

                [...currentAdjStudent.fees_paid].reverse().forEach((bill, idx) => {
                    const originalIndex = currentAdjStudent.fees_paid.length - 1 - idx;
                    const div = document.createElement('div');
                    div.className = 'fee-entry-row';
                    div.style.cssText = 'cursor: pointer; padding: 12px; border: 1px solid var(--border-color); margin-bottom: 8px; border-radius: 5px; background: var(--card-bg); transition: background 0.2s;';
                    div.onmouseover = () => div.style.background = 'var(--table-hover-row)';
                    div.onmouseout = () => div.style.background = 'var(--card-bg)';
                    div.innerHTML = `<div><b style="color:var(--text-main);">${bill.BILL_NO || 'N/A'}</b><br><small style="color:var(--text-main); opacity:0.8;">${bill.PAYMENT_DATE || ''} | ${bill.STD || ''} | ${bill.TERM || ''}</small></div><div style="font-weight:bold; color:var(--panel-header);">₹${bill.AMOUNT || 0}</div>`;
                    div.onclick = () => loadBillForEdit(originalIndex);
                    container.appendChild(div);
                });
            } else SchoolUtils.showPopup("Student not found.", "error");
        })
        .catch(err => SchoolUtils.showPopup("Error fetching bills", "error"));
    }

    function loadBillForEdit(index) {
        currentBillIndex = index;
        const bill = currentAdjStudent.fees_paid[index];
        document.getElementById('adj-placeholder').style.display = 'none';
        const form = document.getElementById('adj-edit-form');
        form.style.display = 'block';
        
        form.innerHTML = `
            <div class="bonafide-form-row"><label class="fee-label-styled">Bill No</label><input type="text" id="edit_bill_no" class="textBoxClass" value="${bill.BILL_NO || ''}"></div>
            <div class="bonafide-form-row"><label class="fee-label-styled">Amount Paid</label><input type="number" id="edit_bill_amount" class="textBoxClass" value="${bill.AMOUNT || 0}"></div>
            <div class="bonafide-form-row"><label class="fee-label-styled">Date</label><input type="text" id="edit_bill_date" class="textBoxClass" value="${bill.PAYMENT_DATE || ''}"></div>
            <div class="bonafide-form-row"><label class="fee-label-styled">Term</label><input type="text" id="edit_bill_term" class="textBoxClass" value="${bill.TERM || ''}"></div>
            <div class="bonafide-form-row"><label class="fee-label-styled">Standard</label><input type="text" id="edit_bill_std" class="textBoxClass" value="${bill.STD || ''}"></div>
            <div class="bonafide-form-row"><label class="fee-label-styled">Billed By</label><input type="text" id="edit_bill_by" class="textBoxClass" value="${bill.BILLED_BY || ''}"></div>
            <div class="action-buttons" style="display:flex; gap:10px; justify-content:center;">
                <button class="sidebar-link active" onclick="updateBillData()">Save Changes</button>
                <button class="sidebar-link active" style="background:#f44336" onclick="deleteBillRecord()">Delete Bill</button>
            </div>
        `;
    }

    function updateBillData() {
        const bill = currentAdjStudent.fees_paid[currentBillIndex];
        bill.BILL_NO = document.getElementById('edit_bill_no').value;
        bill.AMOUNT = document.getElementById('edit_bill_amount').value;
        bill.PAYMENT_DATE = document.getElementById('edit_bill_date').value;
        bill.TERM = document.getElementById('edit_bill_term').value;
        bill.STD = document.getElementById('edit_bill_std').value;
        bill.BILLED_BY = document.getElementById('edit_bill_by').value;
        commitStudentBillUpdate("Bill updated successfully");
    }

    function deleteBillRecord() {
        if(confirm("Are you sure you want to delete this bill?")) {
            currentAdjStudent.fees_paid.splice(currentBillIndex, 1);
            commitStudentBillUpdate("Bill deleted successfully");
        }
    }

    function commitStudentBillUpdate(successMsg) {
         fetch("{% url 'student_update' %}", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
            body: JSON.stringify({ planner_pk: "Student", planner_sk: currentAdjStudent.planner_sk, fees_paid: currentAdjStudent.fees_paid })
        })
        .then(res => res.json()).then(data => {
            if(data.success) { SchoolUtils.showPopup(successMsg, "success"); getStudentBills(); document.getElementById('adj-edit-form').style.display = 'none'; document.getElementById('adj-placeholder').style.display = 'block'; }
            else SchoolUtils.showPopup("Update failed: " + data.error, "error");
        });
    }
</script>
