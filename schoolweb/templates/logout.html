{% load static %}
        <style>
            .utility-bar {
                display: flex;
                justify-content: flex-end;
                align-items: center;
                background-color: var(--panel-header, #014458);
                padding: 4px 20px;
                gap: 20px;
                color: white;
                font-size: 12px;
                flex-wrap: wrap;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                position: fixed;
                top: 90px;
                left: 0;
                width: 100%;
                z-index: 1999;
                box-sizing: border-box;
            }
            [data-theme="dark"] .utility-bar {
                background-color: var(--sidebar-bg, #2d3748) !important;
            }
            .utility-item {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .logout-link {
                color: #fff;
                text-decoration: none;
                background: rgba(255,255,255,0.1);
                padding: 2px 10px;
                border-radius: 4px;
                transition: background 0.2s;
                font-weight: bold;
            }
            .logout-link:hover {
                background: rgba(255,255,255,0.2);
            }
            [data-theme="dark"] .logout-link {
                background: rgba(0,0,0,0.2);
            }
            #clock {
                font-family: monospace;
                font-weight: bold;
                min-width: 180px;
            }

            /* Rounded switch styles */
            .switch {
                position: relative;
                display: inline-block;
                width: 34px;
                height: 18px;
                margin-left: 5px;
            }
            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }
            .slider {
                position: absolute;
                cursor: pointer;
                top: 0; left: 0; right: 0; bottom: 0;
                background-color: #ccc;
                transition: .4s;
                border-radius: 34px;
            }
            .slider:before {
                position: absolute;
                content: "";
                height: 12px;
                width: 12px;
                left: 3px;
                bottom: 3px;
                background-color: white;
                transition: .4s;
                border-radius: 50%;
            }
            input:checked + .slider {
                background-color: var(--panel-header, #2196F3);
            }
            input:checked + .slider:before {
                transform: translateX(16px);
            }
            .utility-spacer { height: 25px; }

            @media (max-width: 768px) {
                .utility-bar { top: 25px; padding: 4px 10px; width: 100%; }
                .utility-spacer { height: 62px; } /* Increased to prevent content overlap */
            }
        </style>
        <div class="utility-bar">
            <div class="utility-item" style="margin-right: auto; opacity: 1;">
                User: <b>{{ request.session.user.user }}</b> ({{ request.session.user.pk }})
            </div>
            <div class="utility-item">
                <label for="theme-toggle-checkbox" style="cursor: pointer; font-size: 11px; opacity: 0.8;">Dark Mode</label>
                <label class="switch">
                    <input type="checkbox" id="theme-toggle-checkbox" onchange="toggleThemeCheckbox(event)">
                    <span class="slider round"></span>
                </label>
            </div>
            <div id="clock"></div>
            <div class="utility-item">
                <a href="{% url 'logout' %}" class="logout-link">Logout</a>
            </div>
        </div>
        <div class="utility-spacer"></div>
        <script>
function updateClock(){document.getElementById('clock').innerText=new Date().toLocaleString()}setInterval(updateClock,1e3);updateClock();
function toggleThemeCheckbox(e){var t=e.target.checked?'dark':'light';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);updateThemeUI(t)}
function updateThemeUI(t){var c=document.getElementById('theme-toggle-checkbox');if(c)c.checked=t==='dark'}(function(){var t=localStorage.getItem('theme')||'light',s="{{ request.session.user.theme|default:'' }}",u="{{ request.session.user.sk|default:'' }}";if(u&&localStorage.getItem('theme_user')!==u){if(s){t=s;localStorage.setItem('theme',t)}localStorage.setItem('theme_user',u)}document.documentElement.setAttribute('data-theme',t);updateThemeUI(t)})();
        </script>
