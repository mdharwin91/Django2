{% load static %}
<!-- Fee Adjustment Section -->
<div id="feeAdjustment" style="display: none; width: 100%; height: 100%; overflow: auto;">
    <div class="panel-header" style="background: var(--card-bg); margin: 0; padding: 15px; border-bottom: 1px solid var(--border-color);">
        Fee Structure Management
    </div>
    <div class="fee-adjust-wrapper">
        <!-- Left Side: Edit Specific Standard -->
        <div class="fee-left-panel">
            <div class="panel-header">Fee Adjustment</div>
            <div class="control-row" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <select id="std_dropdown" name="std" class="textBoxClass" style="flex: 1; height: 40px !important;">
                <option value="">Select Standard</option>
                {% for s in standards %}
                    <option value="{{ s.0 }}">{{ s.1 }}</option>
                {% endfor %}
                </select>
                <button type="button" class="sidebar-link active" style="height: 40px !important; margin: 0; padding: 0 20px; font-size: 14px; flex-shrink: 0;" onclick="getFeeDetails()">Get Details</button>
            </div>
            
            <div id="add-fee-section" style="display: none; margin-bottom: 15px; padding-bottom: 20px; border-bottom: 1px solid #ddd;">
                <div class="control-row" style="display: flex; gap: 10px;">
                     <select id="new_fee_key" class="textBoxClass" style="flex: 2; height: 40px !important;">
                        <option value="">Select Fee</option>
                        {% for key, value in feeNames.items %}
                            <option value="{{ key }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                    <input type="number" id="new_fee_amount" class="textBoxClass" placeholder="Amt" style="flex: 1; text-align: center; height: 40px !important; min-width: 0;">
                    <button type="button" class="sidebar-link active" style="height: 40px !important; margin: 0; padding: 0 15px; font-size: 14px; flex: 1;" onclick="addFeeField()">Add</button>
                </div>
            </div>
            <div id="fee-edit-container" style="flex: 1; overflow-y: auto;"></div>
        </div>

        <!-- Right Side: View All Standards -->
        <div class="fee-right-panel">
            <div class="panel-header">All Standards Summary</div>
            <div id="all-fees-container">Loading...</div>
        </div>
    </div>
</div>

<script>
var originalFeeData={},feeNamesMap=JSON.parse(document.getElementById('fee-names-data').textContent)||{},_E=i=>document.getElementById(i),_S=q=>document.querySelectorAll(q),_P=(m,t)=>SchoolUtils.showPopup(m,t),_F=(u,b)=>fetch(u,{method:"POST",headers:{"Content-Type":"application/json","X-CSRFToken":"{{ csrf_token }}"},body:JSON.stringify(b)});
function getFeeDetails(){let s=_E('std_dropdown').value;if(!s)return _P("Please select a standard.","error");_F("{% url 'get_fee_details' %}",{std:s}).then(r=>r.ok?r.json():r.json().then(e=>{throw e})).then(d=>{if(d.success){let c=_E('fee-edit-container');_E('add-fee-section').style.display='block';originalFeeData=d.data;let e=_E('fee-details-container');if(e)e.remove();let f=document.createElement('div');f.id='fee-details-container';let s=Object.entries(d.data).sort((a,b)=>(feeNamesMap[a[0]]||a[0]).localeCompare(feeNamesMap[b[0]]||b[0]));for(let[k,v]of s){let n=feeNamesMap[k]||k,r=document.createElement('div');r.className='fee-entry-row';r.innerHTML=`<label class="fee-label-styled" title="${n}">${n}</label><input type="number" class="textBoxClass fee-input fee-input-styled" name="${k}" value="${v}">`;f.appendChild(r)}let b=document.createElement('div');b.className='action-buttons';b.innerHTML=`<button type="button" class="sidebar-link active" style="height: 40px; margin: 0;" onclick="updateFees()">Update</button><button type="button" class="sidebar-link active" style="height: 40px; margin: 0; background-color: #f44336;" onclick="resetFees()">Reset</button>`;f.appendChild(b);c.appendChild(f)}else _P("Error: "+d.error,"error")}).catch(e=>_P("Error: "+(e.error||e.message||e),"error"))}
function fetchAllFees(){fetch("{% url 'get_all_fee_details' %}").then(r=>r.json()).then(d=>{if(d.success){let c=_E('all-fees-container'),h='<table class="styled-table"><thead><tr><th style="padding: 5px;">Fee Particulars</th>';d.data.forEach(r=>{h+=`<th style="padding: 5px; text-align: center;">${r.Standard}</th>`});h+='</tr></thead><tbody>';d.columns.forEach(k=>{h+=`<tr><td style="font-weight: bold;">${feeNamesMap[k]||k}</td>`;d.data.forEach(r=>{h+=`<td style="text-align: right;">${r[k]!==undefined?r[k]:'-'}</td>`});h+='</tr>'});h+='</tbody></table>';c.innerHTML=h}else _E('all-fees-container').innerHTML='Error loading fees.'}).catch(e=>{_E('all-fees-container').innerHTML='Network Error.'})}
function updateFees(){let s=_E('std_dropdown').value,f={};_S('.fee-input').forEach(i=>{f[i.name]=i.value});_F("{% url 'update_fee_details' %}",{std:s,fees:f}).then(r=>r.json()).then(d=>{if(d.success){_P(d.message,"success");fetchAllFees()}else _P("Error: "+d.error,"error")})}
function resetFees(){_S('.fee-input').forEach(i=>{i.value=""})}
function addFeeField(){let s=_E('new_fee_key'),k=s.value,a=_E('new_fee_amount').value;if(!k||!a)return _P("Please select type and enter amount.","error");let d=_E('fee-details-container');if(d.querySelector(`input[name="${k}"]`))return _P("This fee type already exists.","error");let r=document.createElement('div');r.className='fee-entry-row';r.innerHTML=`<label class="fee-label-styled">${s.options[s.selectedIndex].text}</label><input type="number" class="textBoxClass fee-input fee-input-styled" name="${k}" value="${a}">`;d.insertBefore(r,d.lastElementChild);s.value="";_E('new_fee_amount').value=""}
</script>
