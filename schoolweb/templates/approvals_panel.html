{% load static %}
<!-- Voucher Approval Section -->
<div id="voucherApprovalSection" style="display: none; height: 100%; overflow: auto; padding: 20px; background: var(--content-bg);">
    <div class="panel-header">Voucher Approvals</div>
    <div style="display: flex; gap: 20px; height: calc(100% - 80px);">
        <!-- Left: List Pane -->
        <div id="pending-vouchers-list" style="width: 35%; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 15px;">
            <!-- Cards will be injected here -->
        </div>
        <!-- Right: Details Pane -->
        <div id="approval-details-pane" style="width: 65%; background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div style="text-align: center; color: #a0aec0;">
                <img src="{% static 'images/Glassed_LOGO_NOBG.png' %}" style="width: 80px; opacity: 0.2; margin-bottom: 15px;"><br>
                <p>Select a pending request from the list to view details and take action.</p>
            </div>
        </div>
    </div>
</div>

<script>
var _E=i=>document.getElementById(i),_S=q=>document.querySelectorAll(q),_P=(m,t)=>SchoolUtils.showPopup(m,t),_F=(u,b)=>fetch(u,{method:"POST",headers:{"Content-Type":"application/json","X-CSRFToken":"{{ csrf_token }}"},body:JSON.stringify(b)});
function fetchPendingVouchers(){fetch("{% url 'get_pending_vouchers' %}").then(r=>r.json()).then(d=>{let l=_E('pending-vouchers-list'),b=_E('pending-bonafides-list'),v=_E('voucher-badge'),a=_E('bonafide-badge'),c=_E('bonafide-requests-container');if(l)l.innerHTML='';if(b)b.innerHTML='';if(d.success&&d.vouchers){let o=d.vouchers.filter(x=>x.approval_type==='Voucher'),f=d.vouchers.filter(x=>x.approval_type==='Bonafide');v.innerText=o.length;v.style.display=o.length>0?'inline-block':'none';a.innerText=f.length;a.style.display=f.length>0?'inline-block':'none';if(l){if(o.length>0)o.forEach(x=>l.appendChild(createApprovalCard(x)));else{let md=document.createElement('div');md.style.cssText='text-align:center; padding:40px; color: var(--table-text); font-style:italic;';md.textContent='No pending vouchers.';l.appendChild(md)}}if(b){if(f.length>0){c.style.display='block';f.forEach(x=>b.appendChild(createApprovalCard(x)))}else c.style.display='none'}}else resetDetailsPane();if(!d.success&&d.error)_P("Error: "+d.error,"error")}).catch(e=>{_P("Failed to connect to server","error");console.error("Error fetching vouchers:",e)})}
function createApprovalCard(v){let i=v.approval_type==='Voucher',s=v.status.toLowerCase(),c=s.includes('signed')?'blue':s.startsWith('in progress')?'#ed8936':s.includes('pending')?'#FFD700':'#a0aec0',t=s.includes('pending')?'#333':'white',d=document.createElement('div');d.className='card approval-card';d.style.cursor='pointer';d.style.marginBottom='10px';d.style.borderLeft=i?'5px solid #667eea':'5px solid #28a745';if(s.startsWith('in progress')||s.includes('pending'))d.style.borderLeft=`5px solid ${c}`;d.style.padding='15px';d.style.background='var(--card-bg)';d.style.border='1px solid var(--border-color)';d.style.borderRadius='12px';d.style.boxShadow='0 2px 10px rgba(0,0,0,0.04)';d.onclick=function(){_S('.approval-card').forEach(x=>x.classList.remove('selected-card'));this.classList.add('selected-card');showApprovalDetails(v)};let f=document.createElement('div');f.style.cssText='display:flex; justify-content:space-between; align-items:start;';let l=document.createElement('div');let b=document.createElement('b');b.style.cssText='color: var(--panel-header); font-size:1.1em;';b.textContent=v.planner_sk;l.appendChild(b);let sp=document.createElement('span');sp.style.cssText=`font-size: 0.7em; background: ${c}; color: ${t}; padding: 2px 6px; border-radius: 4px; margin-left: 5px; text-transform: uppercase;`;sp.textContent=v.status;l.appendChild(sp);l.appendChild(document.createElement('br'));let sm=document.createElement('small');sm.style.color='var(--table-text)';sm.textContent=`${v.approval_type} | ${v.date}`;l.appendChild(sm);let md=document.createElement('div');md.style.cssText='font-size:0.85em; color: var(--table-text); margin-top: 6px;';md.textContent=`Mobile: ${v.mobile||'N/A'}`;l.appendChild(md);if(!i){let nd=document.createElement('div');nd.style.cssText='font-size:0.85em; color: var(--table-text);';nd.textContent=`Name: ${v.name||'N/A'}`;l.appendChild(nd)}let r=document.createElement('div');r.style.cssText=`font-weight:bold; color:${i?'#764ba2':'#28a745'};`;r.textContent=i?'₹'+v.amount:'Bonafide';f.appendChild(l);f.appendChild(r);d.appendChild(f);return d}
function showApprovalDetails(v){let i=v.approval_type==='Voucher',s=(v.status||'').toUpperCase(),g=s.includes('SIGNED');if(!i){currentBonafideRequestId=v.planner_sk;currentBonafideStatus=v.status;window.pendingBonafideCertNo=v.cert_no||null;window.pendingBonafideCertNumInt=v.cert_num_int||null;window.pendingBonafideDate=v.date||null}let c=document.createElement('div');c.className='approval-details-card';let h=document.createElement('div');h.className='panel-header';h.style.cssText='font-size:1.1em; margin-bottom:20px;';h.textContent=`Review ${v.approval_type} Request`;c.appendChild(h);let gr=document.createElement('div');gr.className='approval-details-grid';const aR=(l,vl,vs)=>{let lb=document.createElement('div');lb.style.cssText='font-weight:bold; color:var(--table-text);';lb.textContent=l;gr.appendChild(lb);let vd=document.createElement('div');vd.style.cssText=vs||'color:var(--panel-header); font-weight:bold;';vd.textContent=vl;gr.appendChild(vd)};aR(i?'Voucher No:':'Req Number:',v.planner_sk);aR('Status:',v.status,`color:${v.status.toLowerCase().includes('signed')?'blue':v.status.toLowerCase().startsWith('in progress')?'#ed8936':v.status.toLowerCase().includes('pending')?'#FFD700':'#a0aec0'}; font-weight:bold; text-transform:uppercase;`);aR('Profile Type:',v.profile||(i?'Finance':'Academic'));aR(i?'Name:':'Target Name:',v.name||'N/A');if(!i)aR('Target ID:',v.target_id||v.planner_sk,'color:var(--panel-header);');aR('Requested By:',v.requested_by||v.billed_by||v.name||'N/A','color:var(--panel-header);');aR('Mobile:',v.mobile||'N/A','color:var(--panel-header);');if(i)aR('Amount:',`₹${v.amount}`,'color:#764ba2; font-weight:bold; font-size:1.2em;');aR('Purpose:',`"${v.purpose}"`,'color:var(--text-main); font-style:italic; line-height:1.4;');c.appendChild(gr);let bd=document.createElement('div');bd.style.cssText='display:flex; flex-direction:column; gap:10px; margin-top:30px; border-top:1px solid var(--border-color); padding-top:20px;';if(!i&&!g){let b1=document.createElement('button');b1.id='btn-prepare-b';b1.className='sidebar-link active';b1.style.cssText='margin:0; background: #014458; border: 2px solid #014458;';b1.onclick=()=>prepareAndGenerate(v.profile,v.target_id);b1.textContent='Prepare Certificate';bd.appendChild(b1)}if(!i){let bb=document.createElement('div');bb.id='bonafide-btns';bb.style.cssText='display:none; flex-direction:column; gap:10px;';let r1=document.createElement('div');r1.style.cssText='display:flex; gap:15px;';let b_save=document.createElement('button');b_save.className='sidebar-link active';b_save.onclick=saveBonafide;b_save.id='btn-save-record-b';b_save.style.cssText='flex:1; margin:0; background: #10b981;';b_save.title='Save Record';b_save.textContent='Save';let b_pdf=document.createElement('button');b_pdf.className='sidebar-link active';b_pdf.onclick=saveBonafidePDF;b_pdf.id='btn-pdf-b';b_pdf.style.cssText='display:none; flex:1; margin:0; background: #f59e0b;';b_pdf.title='Download PDF';b_pdf.textContent='Print';r1.appendChild(b_save);r1.appendChild(b_pdf);let r2=document.createElement('div');r2.style.cssText='display:flex; gap:15px;';let b_sign=document.createElement('button');b_sign.className='sidebar-link active';b_sign.onclick=markBonafideSigned;b_sign.id='btn-signed-b';b_sign.style.cssText='display:none; flex:1; margin:0; background: #06b6d4;';b_sign.title='Mark as Signed';b_sign.textContent='Signed';let b_res=document.createElement('button');b_res.className='sidebar-link active';b_res.onclick=resetBonafidePage;b_res.id='btn-reset-b';b_res.style.cssText='flex:1; margin:0; background: #6b7280;';b_res.title='Reset';b_res.textContent='Reset';r2.appendChild(b_sign);r2.appendChild(b_res);bb.appendChild(r1);bb.appendChild(r2);bd.appendChild(bb)}if(i){let ar=document.createElement('div');ar.style.cssText='display:flex; gap:15px;';let b1=document.createElement('button');b1.className='sidebar-link active';b1.style.cssText='flex:1; margin:0; background:linear-gradient(135deg, #28a745 0%, #218838 100%);';b1.onclick=()=>processVoucherAction(v.planner_sk,'Approved',v.approval_type);b1.textContent='Approve';ar.appendChild(b1);let b2=document.createElement('button');b2.className='sidebar-link active';b2.style.cssText='flex:1; margin:0; background:linear-gradient(135deg, #f6ad55 0%, #ed8936 100%);';b2.onclick=()=>processVoucherAction(v.planner_sk,'In Progress',v.approval_type);b2.textContent='In Progress';ar.appendChild(b2);bd.appendChild(ar);let b3=document.createElement('button');b3.className='sidebar-link active';b3.style.cssText='margin:0; background:linear-gradient(135deg, #dc3545 0%, #c82333 100%);';b3.onclick=()=>processVoucherAction(v.planner_sk,'Rejected',v.approval_type);b3.textContent='Reject';bd.appendChild(b3)}c.appendChild(bd);let hi=document.createElement('div');hi.id='hidden-bonafide-inputs';hi.style.display='none';['bonafide_res_profile','bonafide_name','bonafide_sk','bonafide_emis','bonafide_std','bonafide_doj','bonafide_dol'].forEach(id=>{let inp=document.createElement('input');inp.type='hidden';inp.id=id;hi.appendChild(inp);});c.appendChild(hi);let tp=i?_E('approval-details-pane'):_E('bonafide-details-form');tp.innerHTML='';tp.appendChild(c)}
function prepareAndGenerate(p,t){_F("{% url 'student_get' %}",{planner_pk:p,planner_sk:t}).then(r=>r.json()).then(d=>{if(d.user_info){let i=d.user_info;if(_E('bonafide_res_profile'))_E('bonafide_res_profile').value=i.planner_pk||p||'';if(_E('bonafide_name'))_E('bonafide_name').value=i.name||'';if(_E('bonafide_sk'))_E('bonafide_sk').value=i.planner_sk||'';if(_E('bonafide_emis'))_E('bonafide_emis').value=i.emis||'';if(_E('bonafide_std'))_E('bonafide_std').value=i.std||'';if(_E('bonafide_doj'))_E('bonafide_doj').value=i.doj||'';if(_E('bonafide_dol'))_E('bonafide_dol').value=i.dol||'';generateBonafide();_P("Certificate Prepared Successfully!","success")}else _P("Failed to fetch profile details for generation.","error")}).catch(e=>_P("An error occurred during preparation.","error"))}
function resetDetailsPane(){let p=_E('approval-details-pane');p.innerHTML='';let d=document.createElement('div');d.style.cssText='text-align: center; color: #a0aec0;';let img=document.createElement('img');img.src="{% static 'images/Glassed_LOGO_NOBG.png' %}";img.style.cssText='width: 80px; opacity: 0.2; margin-bottom: 15px;';d.appendChild(img);d.appendChild(document.createElement('br'));let pEl=document.createElement('p');pEl.textContent='Select a pending request from the list to view details and take action.';d.appendChild(pEl);p.appendChild(d)}
function processVoucherAction(i,a,t){if(!confirm(`Are you sure you want to ${a.toLowerCase()} ${t} ${i}?`))return;_F("{% url 'approve_voucher' %}",{[t==='Voucher'?'voucher_no':'item_id']:i,action:a,type:t}).then(r=>r.json()).then(d=>{if(d.success){_P(d.message,"success");fetchPendingVouchers()}else _P(d.error,"error")}).catch(e=>_P("An error occurred during approval process","error"))}
</script>
