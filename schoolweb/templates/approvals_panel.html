{% load static %}
<!-- Voucher Approval Section -->
<div id="voucherApprovalSection" style="display: none; height: 100%; overflow: auto; padding: 20px; background: var(--content-bg);">
    <div class="panel-header">Voucher Approvals</div>
    <div style="display: flex; gap: 20px; height: calc(100% - 80px);">
        <!-- Left: List Pane -->
        <div id="pending-vouchers-list" style="width: 35%; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 15px;">
            <!-- Cards will be injected here -->
        </div>
        <!-- Right: Details Pane -->
        <div id="approval-details-pane" style="width: 65%; background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div style="text-align: center; color: #a0aec0;">
                <img src="{% static 'images/Glassed_LOGO_NOBG.png' %}" style="width: 80px; opacity: 0.2; margin-bottom: 15px;"><br>
                <p>Select a pending request from the list to view details and take action.</p>
            </div>
        </div>
    </div>
</div>

<script>
var _E=i=>document.getElementById(i),_S=q=>document.querySelectorAll(q),_P=(m,t)=>SchoolUtils.showPopup(m,t),_F=(u,b)=>fetch(u,{method:"POST",headers:{"Content-Type":"application/json","X-CSRFToken":"{{ csrf_token }}"},body:JSON.stringify(b)});
function fetchPendingVouchers(){fetch("{% url 'get_pending_vouchers' %}").then(r=>r.json()).then(d=>{let l=_E('pending-vouchers-list'),b=_E('pending-bonafides-list'),v=_E('voucher-badge'),a=_E('bonafide-badge'),c=_E('bonafide-requests-container');if(l)l.innerHTML='';if(b)b.innerHTML='';if(d.success&&d.vouchers){let o=d.vouchers.filter(x=>x.approval_type==='Voucher'),f=d.vouchers.filter(x=>x.approval_type==='Bonafide');v.innerText=o.length;v.style.display=o.length>0?'inline-block':'none';a.innerText=f.length;a.style.display=f.length>0?'inline-block':'none';if(l){if(o.length>0)o.forEach(x=>l.appendChild(createApprovalCard(x)));else l.innerHTML='<div style="text-align:center; padding:40px; color: var(--table-text); font-style:italic;">No pending vouchers.</div>'}if(b){if(f.length>0){c.style.display='block';f.forEach(x=>b.appendChild(createApprovalCard(x)))}else c.style.display='none'}}else resetDetailsPane();if(!d.success&&d.error)_P("Error: "+d.error,"error")}).catch(e=>{_P("Failed to connect to server","error");console.error("Error fetching vouchers:",e)})}
function createApprovalCard(v){let i=v.approval_type==='Voucher',s=v.status.toLowerCase(),c=s.includes('signed')?'blue':s.startsWith('in progress')?'#ed8936':s.includes('pending')?'#FFD700':'#a0aec0',t=s.includes('pending')?'#333':'white',d=document.createElement('div');d.className='card approval-card';d.style.cursor='pointer';d.style.marginBottom='10px';d.style.borderLeft=i?'5px solid #667eea':'5px solid #28a745';if(s.startsWith('in progress')||s.includes('pending'))d.style.borderLeft=`5px solid ${c}`;d.style.padding='15px';d.style.background='var(--card-bg)';d.style.border='1px solid var(--border-color)';d.style.borderRadius='12px';d.style.boxShadow='0 2px 10px rgba(0,0,0,0.04)';d.onclick=function(){_S('.approval-card').forEach(x=>x.classList.remove('selected-card'));this.classList.add('selected-card');showApprovalDetails(v)};d.innerHTML=`<div style="display:flex; justify-content:space-between; align-items:start;"><div><b style="color: var(--panel-header); font-size:1.1em;">${v.planner_sk}</b><span style="font-size: 0.7em; background: ${c}; color: ${t}; padding: 2px 6px; border-radius: 4px; margin-left: 5px; text-transform: uppercase;">${v.status}</span><br><small style="color: var(--table-text);">${v.approval_type} | ${v.date}</small><div style="font-size:0.85em; color: var(--table-text); margin-top: 6px;">Mobile: ${v.mobile||'N/A'}</div>${!i?`<div style="font-size:0.85em; color: var(--table-text);">Name: ${v.name||'N/A'}</div>`:''}</div><div style="font-weight:bold; color:${i?'#764ba2':'#28a745'};">${i?'₹'+v.amount:'Bonafide'}</div></div>`;return d}
function showApprovalDetails(v){let i=v.approval_type==='Voucher',s=(v.status||'').toUpperCase(),g=s.includes('SIGNED');if(!i){currentBonafideRequestId=v.planner_sk;currentBonafideStatus=v.status;window.pendingBonafideCertNo=v.cert_no||null;window.pendingBonafideCertNumInt=v.cert_num_int||null;window.pendingBonafideDate=v.date||null}let c=`<div class="approval-details-card"><div class="panel-header" style="font-size:1.1em; margin-bottom:20px;">Review ${v.approval_type} Request</div><div class="approval-details-grid"><div style="font-weight:bold; color:var(--table-text);">${i?'Voucher No:':'Req Number:'}</div><div style="color:var(--panel-header); font-weight:bold;">${v.planner_sk}</div><div style="font-weight:bold; color:var(--table-text);">Status:</div><div style="color:${v.status.toLowerCase().includes('signed')?'blue':v.status.toLowerCase().startsWith('in progress')?'#ed8936':v.status.toLowerCase().includes('pending')?'#FFD700':'#a0aec0'}; font-weight:bold; text-transform:uppercase;">${v.status}</div><div style="font-weight:bold; color:var(--table-text);">Profile Type:</div><div style="color:var(--panel-header); font-weight:bold;">${v.profile||(i?'Finance':'Academic')}</div><div style="font-weight:bold; color:var(--table-text);">${i?'Name:':'Target Name:'}</div><div style="color:var(--panel-header); font-weight:bold;">${v.name||'N/A'}</div>${!i?`<div style="font-weight:bold; color:var(--table-text);">Target ID:</div><div style="color:var(--panel-header);">${v.target_id||v.planner_sk}</div>`:''}<div style="font-weight:bold; color:var(--table-text);">Requested By:</div><div style="color:var(--panel-header);">${v.requested_by||v.billed_by||v.name||'N/A'}</div><div style="font-weight:bold; color:var(--table-text);">Mobile:</div><div style="color:var(--panel-header);">${v.mobile||'N/A'}</div>${i?`<div style="font-weight:bold; color:var(--table-text);">Amount:</div><div style="color:#764ba2; font-weight:bold; font-size:1.2em;">₹${v.amount}</div>`:''}<div style="font-weight:bold; color:var(--table-text);">Purpose:</div><div style="color:var(--text-main); font-style:italic; line-height:1.4;">"${v.purpose}"</div></div><div style="display:flex; flex-direction:column; gap:10px; margin-top:30px; border-top:1px solid var(--border-color); padding-top:20px;">${!i&&!g?`<button id="btn-prepare-b" onclick="prepareAndGenerate('${v.profile}', '${v.target_id}')" class="sidebar-link active" style="margin:0; background: #014458; border: 2px solid #014458;">Prepare Certificate</button>`:''}${!i?`<div id="bonafide-btns" style="display:none; flex-direction:column; gap:10px;"><div style="display:flex; gap:15px;"><button class="sidebar-link active" onclick="saveBonafide()" id="btn-save-record-b" style="flex:1; margin:0; background: #10b981;" title="Save Record">Save</button><button class="sidebar-link active" onclick="saveBonafidePDF()" id="btn-pdf-b" style="display:none; flex:1; margin:0; background: #f59e0b;" title="Download PDF">Print</button></div><div style="display:flex; gap:15px;"><button class="sidebar-link active" onclick="markBonafideSigned()" id="btn-signed-b" style="display:none; flex:1; margin:0; background: #06b6d4;" title="Mark as Signed">Signed</button><button class="sidebar-link active" onclick="resetBonafidePage()" id="btn-reset-b" style="flex:1; margin:0; background: #6b7280;" title="Reset">Reset</button></div></div>`:''}${i?`<div style="display:flex; gap:15px;"><button onclick="processVoucherAction('${v.planner_sk}', 'Approved', '${v.approval_type}')" class="sidebar-link active" style="flex:1; margin:0; background:linear-gradient(135deg, #28a745 0%, #218838 100%);">Approve</button><button onclick="processVoucherAction('${v.planner_sk}', 'In Progress', '${v.approval_type}')" class="sidebar-link active" style="flex:1; margin:0; background:linear-gradient(135deg, #f6ad55 0%, #ed8936 100%);">In Progress</button></div><button onclick="processVoucherAction('${v.planner_sk}', 'Rejected', '${v.approval_type}')" class="sidebar-link active" style="margin:0; background:linear-gradient(135deg, #dc3545 0%, #c82333 100%);">Reject</button>`:''}</div></div><div id="hidden-bonafide-inputs" style="display:none;"><input type="hidden" id="bonafide_res_profile"> <input type="hidden" id="bonafide_name"> <input type="hidden" id="bonafide_sk"><input type="hidden" id="bonafide_emis"> <input type="hidden" id="bonafide_std"> <input type="hidden" id="bonafide_doj"> <input type="hidden" id="bonafide_dol"></div>`;if(i)_E('approval-details-pane').innerHTML=c;else _E('bonafide-details-form').innerHTML=c}
function prepareAndGenerate(p,t){_F("{% url 'student_get' %}",{planner_pk:p,planner_sk:t}).then(r=>r.json()).then(d=>{if(d.user_info){let i=d.user_info;if(_E('bonafide_res_profile'))_E('bonafide_res_profile').value=i.planner_pk||p||'';if(_E('bonafide_name'))_E('bonafide_name').value=i.name||'';if(_E('bonafide_sk'))_E('bonafide_sk').value=i.planner_sk||'';if(_E('bonafide_emis'))_E('bonafide_emis').value=i.emis||'';if(_E('bonafide_std'))_E('bonafide_std').value=i.std||'';if(_E('bonafide_doj'))_E('bonafide_doj').value=i.doj||'';if(_E('bonafide_dol'))_E('bonafide_dol').value=i.dol||'';generateBonafide();_P("Certificate Prepared Successfully!","success")}else _P("Failed to fetch profile details for generation.","error")}).catch(e=>_P("An error occurred during preparation.","error"))}
function resetDetailsPane(){_E('approval-details-pane').innerHTML=`<div style="text-align: center; color: #a0aec0;"><img src="{% static 'images/Glassed_LOGO_NOBG.png' %}" style="width: 80px; opacity: 0.2; margin-bottom: 15px;"><br><p>Select a pending request from the list to view details and take action.</p></div>`}
function processVoucherAction(i,a,t){if(!confirm(`Are you sure you want to ${a.toLowerCase()} ${t} ${i}?`))return;_F("{% url 'approve_voucher' %}",{[t==='Voucher'?'voucher_no':'item_id']:i,action:a,type:t}).then(r=>r.json()).then(d=>{if(d.success){_P(d.message,"success");fetchPendingVouchers()}else _P(d.error,"error")}).catch(e=>_P("An error occurred during approval process","error"))}
</script>
