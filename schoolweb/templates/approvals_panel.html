{% load static %}
<!-- Voucher Approval Section -->
<div id="voucherApprovalSection" style="display: none; height: 100%; overflow: auto; padding: 20px; background: var(--content-bg);">
    <div class="panel-header">Voucher Approvals</div>
    <div style="display: flex; gap: 20px; height: calc(100% - 80px);">
        <!-- Left: List Pane -->
        <div id="pending-vouchers-list" style="width: 35%; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 15px;">
            <!-- Cards will be injected here -->
        </div>
        <!-- Right: Details Pane -->
        <div id="approval-details-pane" style="width: 65%; background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div style="text-align: center; color: #a0aec0;">
                <img src="{% static 'images/Glassed_LOGO_NOBG.png' %}" style="width: 80px; opacity: 0.2; margin-bottom: 15px;"><br>
                <p>Select a pending request from the list to view details and take action.</p>
            </div>
        </div>
    </div>
</div>

<script>
    function fetchPendingVouchers() {
        fetch("{% url 'get_pending_vouchers' %}")
        .then(res => res.json())
        .then(data => {
            const vList = document.getElementById('pending-vouchers-list');
            const bList = document.getElementById('pending-bonafides-list');
            const vBadge = document.getElementById('voucher-badge');
            const bBadge = document.getElementById('bonafide-badge');
            const bContainer = document.getElementById('bonafide-requests-container');
            
            if(vList) vList.innerHTML = '';
            if(bList) bList.innerHTML = '';
            
            if (data.success && data.vouchers) {
                const vouchers = data.vouchers.filter(x => x.approval_type === 'Voucher');
                const bonafides = data.vouchers.filter(x => x.approval_type === 'Bonafide');

                // Update Badges
                vBadge.innerText = vouchers.length;
                vBadge.style.display = vouchers.length > 0 ? 'inline-block' : 'none';
                bBadge.innerText = bonafides.length;
                bBadge.style.display = bonafides.length > 0 ? 'inline-block' : 'none';

                // Populate Vouchers List
                if (vList) {
                    if (vouchers.length > 0) {
                        vouchers.forEach(v => vList.appendChild(createApprovalCard(v)));
                    } else {
                        vList.innerHTML = '<div style="text-align:center; padding:40px; color: var(--table-text); font-style:italic;">No pending vouchers.</div>';
                    }
                }

                // Populate Bonafides List
                if (bList) {
                    if (bonafides.length > 0) {
                        bContainer.style.display = 'block';
                        bonafides.forEach(b => bList.appendChild(createApprovalCard(b)));
                    } else {
                        bContainer.style.display = 'none';
                    }
                }
            } else {
                resetDetailsPane();
            }
            if (!data.success && data.error) {
                SchoolUtils.showPopup("Error: " + data.error, "error");
            }
        })
        .catch(err => {
            SchoolUtils.showPopup("Failed to connect to server", "error");
            console.error("Error fetching vouchers:", err);
        });
    }

    function createApprovalCard(v) {
        const isVoucher = v.approval_type === 'Voucher';
        const statusLower = v.status.toLowerCase();
        const statusColor = statusLower.includes('signed') ? 'blue' : 
                           (statusLower.startsWith('in progress') ? '#ed8936' : (statusLower.includes('pending') ? '#FFD700' : '#a0aec0'));
        const textColor = statusLower.includes('pending') ? '#333' : 'white';
        const card = document.createElement('div');
        card.className = 'card approval-card';
        card.style.cursor = 'pointer';
        card.style.marginBottom = '10px';
        card.style.borderLeft = isVoucher ? '5px solid #667eea' : '5px solid #28a745';
        if (statusLower.startsWith('in progress') || statusLower.includes('pending')) card.style.borderLeft = `5px solid ${statusColor}`;
        card.style.padding = '15px';
        card.style.background = 'var(--card-bg)';
        card.style.border = '1px solid var(--border-color)';
        card.style.borderRadius = '12px';
        card.style.boxShadow = '0 2px 10px rgba(0,0,0,0.04)';
        card.onclick = function() {
            document.querySelectorAll('.approval-card').forEach(c => c.classList.remove('selected-card'));
            this.classList.add('selected-card');
            showApprovalDetails(v);
        };
        
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <div>
                    <b style="color: var(--panel-header); font-size:1.1em;">${v.planner_sk}</b>
                    <span style="font-size: 0.7em; background: ${statusColor}; color: ${textColor}; padding: 2px 6px; border-radius: 4px; margin-left: 5px; text-transform: uppercase;">${v.status}</span>
                    <br>
                    <small style="color: var(--table-text);">${v.approval_type} | ${v.date}</small>
                    <div style="font-size:0.85em; color: var(--table-text); margin-top: 6px;">Mobile: ${v.mobile || 'N/A'}</div>
                    ${!isVoucher ? `<div style="font-size:0.85em; color: var(--table-text);">Name: ${v.name || 'N/A'}</div>` : ''}
                </div>
                <div style="font-weight:bold; color:${isVoucher ? '#764ba2' : '#28a745'};">
                    ${isVoucher ? '₹'+v.amount : 'Bonafide'}
                </div>
            </div>
        `;
        return card;
    }

    function showApprovalDetails(v) {
        const isVoucher = v.approval_type === 'Voucher';
        const statusVal = (v.status || '').toUpperCase();
        const isSigned = statusVal.includes('SIGNED');
        
        if (!isVoucher) {
            currentBonafideRequestId = v.planner_sk;
            currentBonafideStatus = v.status;
            window.pendingBonafideCertNo = v.cert_no || null;
            window.pendingBonafideCertNumInt = v.cert_num_int || null;
            window.pendingBonafideDate = v.date || null;
        }

        const content = `
            <div class="approval-details-card">
                <div class="panel-header" style="font-size:1.1em; margin-bottom:20px;">Review ${v.approval_type} Request</div>
                
                <div class="approval-details-grid">
                    <div style="font-weight:bold; color:var(--table-text);">${isVoucher ? 'Voucher No:' : 'Req Number:'}</div>
                    <div style="color:var(--panel-header); font-weight:bold;">${v.planner_sk}</div>

                    <div style="font-weight:bold; color:var(--table-text);">Status:</div>
                    <div style="color:${v.status.toLowerCase().includes('signed') ? 'blue' : (v.status.toLowerCase().startsWith('in progress') ? '#ed8936' : (v.status.toLowerCase().includes('pending') ? '#FFD700' : '#a0aec0'))}; font-weight:bold; text-transform:uppercase;">${v.status}</div>

                    <div style="font-weight:bold; color:var(--table-text);">Profile Type:</div>
                    <div style="color:var(--panel-header); font-weight:bold;">${v.profile || (isVoucher ? 'Finance' : 'Academic')}</div>
                    
                    <div style="font-weight:bold; color:var(--table-text);">${isVoucher ? 'Name:' : 'Target Name:'}</div>
                    <div style="color:var(--panel-header); font-weight:bold;">${v.name || 'N/A'}</div>

                    ${!isVoucher ? `
                        <div style="font-weight:bold; color:var(--table-text);">Target ID:</div>
                        <div style="color:var(--panel-header);">${v.target_id || v.planner_sk}</div>
                    ` : ''}
                    
                    <div style="font-weight:bold; color:var(--table-text);">Requested By:</div>
                    <div style="color:var(--panel-header);">${v.requested_by || v.billed_by || v.name || 'N/A'}</div>

                    <div style="font-weight:bold; color:var(--table-text);">Mobile:</div>
                    <div style="color:var(--panel-header);">${v.mobile || 'N/A'}</div>

                    ${isVoucher ? `
                        <div style="font-weight:bold; color:var(--table-text);">Amount:</div>
                        <div style="color:#764ba2; font-weight:bold; font-size:1.2em;">₹${v.amount}</div>
                    ` : ''}

                    <div style="font-weight:bold; color:var(--table-text);">Purpose:</div>
                    <div style="color:var(--text-main); font-style:italic; line-height:1.4;">"${v.purpose}"</div>
                </div>

                <div style="display:flex; flex-direction:column; gap:10px; margin-top:30px; border-top:1px solid var(--border-color); padding-top:20px;">
                    ${(!isVoucher && !isSigned) ? `<button id="btn-prepare-b" onclick="prepareAndGenerate('${v.profile}', '${v.target_id}')" class="sidebar-link active" style="margin:0; background: #014458; border: 2px solid #014458;">Prepare Certificate</button>` : ''}
                    ${(!isVoucher) ? `
                    <div id="bonafide-btns" style="display:none; flex-direction:column; gap:10px;">
                        <div style="display:flex; gap:15px;">
                            <button class="sidebar-link active" onclick="saveBonafide()" id="btn-save-record-b" style="flex:1; margin:0; background: #10b981;" title="Save Record">Save</button>
                            <button class="sidebar-link active" onclick="saveBonafidePDF()" id="btn-pdf-b" style="display:none; flex:1; margin:0; background: #f59e0b;" title="Download PDF">Print</button>
                        </div>
                        <div style="display:flex; gap:15px;">
                            <button class="sidebar-link active" onclick="markBonafideSigned()" id="btn-signed-b" style="display:none; flex:1; margin:0; background: #06b6d4;" title="Mark as Signed">Signed</button>
                            <button class="sidebar-link active" onclick="resetBonafidePage()" id="btn-reset-b" style="flex:1; margin:0; background: #6b7280;" title="Reset">Reset</button>
                        </div>
                    </div>
                    ` : ''}
                    ${isVoucher ? `
                    <div style="display:flex; gap:15px;">
                        <button onclick="processVoucherAction('${v.planner_sk}', 'Approved', '${v.approval_type}')" class="sidebar-link active" style="flex:1; margin:0; background:linear-gradient(135deg, #28a745 0%, #218838 100%);">Approve</button>
                        <button onclick="processVoucherAction('${v.planner_sk}', 'In Progress', '${v.approval_type}')" class="sidebar-link active" style="flex:1; margin:0; background:linear-gradient(135deg, #f6ad55 0%, #ed8936 100%);">In Progress</button>
                    </div>
                    <button onclick="processVoucherAction('${v.planner_sk}', 'Rejected', '${v.approval_type}')" class="sidebar-link active" style="margin:0; background:linear-gradient(135deg, #dc3545 0%, #c82333 100%);">Reject</button>
                    ` : ''}
                </div>
            </div>
            <div id="hidden-bonafide-inputs" style="display:none;">
                <input type="hidden" id="bonafide_res_profile"> <input type="hidden" id="bonafide_name"> <input type="hidden" id="bonafide_sk">
                <input type="hidden" id="bonafide_emis"> <input type="hidden" id="bonafide_std"> <input type="hidden" id="bonafide_doj"> <input type="hidden" id="bonafide_dol">
            </div>
        `;

        if (isVoucher) {
            document.getElementById('approval-details-pane').innerHTML = content;
        } else {
            // For Bonafide, we show details in the generation form area
            document.getElementById('bonafide-details-form').innerHTML = content;
            // Optionally trigger the preview if enough data is present
        }
    }

    function prepareAndGenerate(profile, targetId) {
        fetch("{% url 'student_get' %}", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
            body: JSON.stringify({ planner_pk: profile, planner_sk: targetId })
        })
        .then(res => res.json())
        .then(data => {
            if (data.user_info) {
                const info = data.user_info;
                if(document.getElementById('bonafide_res_profile')) document.getElementById('bonafide_res_profile').value = info.planner_pk || profile || '';
                if(document.getElementById('bonafide_name')) document.getElementById('bonafide_name').value = info.name || '';
                if(document.getElementById('bonafide_sk')) document.getElementById('bonafide_sk').value = info.planner_sk || '';
                if(document.getElementById('bonafide_emis')) document.getElementById('bonafide_emis').value = info.emis || '';
                if(document.getElementById('bonafide_std')) document.getElementById('bonafide_std').value = info.std || '';
                if(document.getElementById('bonafide_doj')) document.getElementById('bonafide_doj').value = info.doj || '';
                if(document.getElementById('bonafide_dol')) document.getElementById('bonafide_dol').value = info.dol || '';
                generateBonafide();
                SchoolUtils.showPopup("Certificate Prepared Successfully!", "success");
            } else {
                SchoolUtils.showPopup("Failed to fetch profile details for generation.", "error");
            }
        })
        .catch(err => SchoolUtils.showPopup("An error occurred during preparation.", "error"));
    }

    function resetDetailsPane() {
        document.getElementById('approval-details-pane').innerHTML = `
            <div style="text-align: center; color: #a0aec0;">
                <img src="{% static 'images/Glassed_LOGO_NOBG.png' %}" style="width: 80px; opacity: 0.2; margin-bottom: 15px;"><br>
                <p>Select a pending request from the list to view details and take action.</p>
            </div>
        `;
    }

    function processVoucherAction(itemId, action, type) {
        if(!confirm(`Are you sure you want to ${action.toLowerCase()} ${type} ${itemId}?`)) return;
        const url = type === 'Voucher' ? "{% url 'approve_voucher' %}" : "{% url 'approve_voucher' %}"; // Use a unified or specific endpoint
        
        fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRFToken": "{{ csrf_token }}" },
            body: JSON.stringify({ 
                [type === 'Voucher' ? 'voucher_no' : 'item_id']: itemId, 
                action: action, 
                type: type 
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                SchoolUtils.showPopup(data.message, "success");
                fetchPendingVouchers();
            } else {
                SchoolUtils.showPopup(data.error, "error");
            }
        })
        .catch(err => SchoolUtils.showPopup("An error occurred during approval process", "error"));
    }
</script>
