{% load static %}
<style>
    .site-footer {
        background-color: var(--panel-header, #014458);
        color: #ffffff;
        text-align: center;
        padding: 5px 10px;
        margin-top: 0;
        border-top: 3px solid var(--border-color, #667eea);
        font-size: 10px;
        width: 100%;
        position: fixed;
        bottom: 0;
        left: 0;
        z-index: 2000;
    }
    [data-theme="dark"] .site-footer {
        background-color: var(--sidebar-bg, #2d3748) !important;
    }
    .site-footer p {
        margin: 2px 0;
        color: #ffffff;
    }
    [data-theme="dark"] .site-footer p {
        color: var(--text-main, #f7fafc);
    }
</style>
<div class="site-footer">
    <p><b>{{schoolInformation.schoolName}}</b> | Managed by {{schoolInformation.trustName}} | {{schoolInformation.trustAddress}}</p>
    <p>&copy; {% now "Y" %} {{schoolInformation.vasantham}} {{schoolInformation.school}}. All rights reserved. | IP: {{ request.META.REMOTE_ADDR }}</p>
</div>
