{% load static %}
<!-- Bonafide Section -->
<div id="bonafideSection" style="display: none; width: 100%; height: 100%; overflow: auto;">
    <style>
        .letterhead-bonafide {
            display: flex;
            align-items: center;
            justify-content: center; /* Center the letterhead content */
            padding-bottom: 20px;
            border-bottom: 1px solid #014458; /* Thin horizontal line */
            margin-bottom: 30px;
        }
        .letterhead-logo-bonafide {
            width: 110px;
            height: 110px;
            flex-shrink: 0;
            object-fit: contain;
            margin-right: 20px;
        }
        .letterhead-text-bonafide {
            text-align: center;
        }
        .letterhead-title-bonafide {
            font-size: 24pt;
            margin: 0;
            color: #014458; /* Professional dark teal to match the ERP theme */
            text-transform: uppercase;
            font-weight: bold;
        }
        .letterhead-sub-bonafide {
            font-size: 12px;
            color: #4a5568;
            margin: 5px 0;
            font-style: italic;
        }
        .letterhead-reg-bonafide {
            font-size: 9px;
            color: #718096;
            opacity: 0.9;
            font-weight: normal;
            float: left;
        }
        .letterhead-contact-bonafide {
            font-size: 8px;
            float: right;
            color: #718096;
            opacity: 0.9;
            font-weight: normal;
        }
        .watermark-bg {
            position: relative;
            z-index: 1;
        }
        .watermark-bg::after {
            content: "";
            background: url('{% static "images/Glassed_LOGO_NOBG.png" %}') no-repeat center;
            background-size: 100%; /* Doubled from the standard 50% for high visibility */
            opacity: 0.08;
            top: 0; left: 0; bottom: 0; right: 0;
            position: absolute;
            z-index: -1;
            pointer-events: none;
        }
        .selected-card {
            background-color: var(--table-hover-row) !important;
            border-color: var(--panel-header) !important;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2) !important;
        }
        /* Smooth expansion styles */
        .bonafide-expand-details {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            margin-top: 0;
            padding-top: 0;
        }
        .bonafide-expand-details.expanded {
            max-height: 1500px; /* High enough to fit the review form */
            opacity: 1;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }
        .preview-header-modern {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 18px;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        .preview-header-title {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }
        .preview-header-icon {
            width: 28px;
            height: 28px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .preview-header-text h3 {
            margin: 0;
            color: white;
            font-size: 1.05em;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .preview-header-text p {
            margin: 2px 0 0 0;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.75em;
            font-weight: 400;
        }
        .preview-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .zoom-control {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 10px;
            border-radius: 8px;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        .zoom-control img {
            width: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .zoom-control img:hover {
            transform: scale(1.1);
        }
        .zoom-level {
            font-weight: 600;
            font-size: 12px;
            color: white;
            min-width: 35px;
            text-align: center;
        }
        .header-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
        }
        .action-btn {
            padding: 7px 12px;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            color: white;
        }
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .btn-save {
            background: #10b981;
        }
        .btn-save:hover {
            background: #059669;
        }
        .btn-pdf {
            background: #f59e0b;
        }
        .btn-pdf:hover {
            background: #d97706;
        }
        .btn-reset {
            background: #6b7280;
        }
        .btn-reset:hover {
            background: #4b5563;
        }
        .btn-signed {
            background: #06b6d4;
        }
        .btn-signed:hover {
            background: #0891b2;
        }
    </style>
    <div class="bonafide-wrapper" style="display: flex; gap: 20px;">
        <div id="bonafide-left" class="bonafide-left" style="flex: 1;">
            <div class="panel-header" style="margin-bottom: 20px;">Bonafide Manager</div>
            
            <!-- Section 1 & 3: Pending Requests + Review/Form Area (Inline) -->
            <div style="display: flex; gap: 20px;">
                <!-- Pending Requests List -->
                <div id="bonafide-requests-container" style="flex: 0 0 35%; display: none;">
                    <div style="font-size: 0.85em; font-weight: bold; color: var(--panel-header); margin-bottom: 10px; text-transform: uppercase;">Incoming Requests</div>
                    <div id="pending-bonafides-list" style="display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; padding: 2px;"></div>
                </div>

                <!-- Review/Form Area -->
                <div id="bonafide-details-form" style="flex: 1; display: flex; flex-direction: column; gap: 15px;">
                    <div style="text-align: center; padding: 40px 20px; color: #a0aec0; background: var(--card-bg); border-radius: 12px; border: 2px dashed var(--border-color);">
                        <p style="font-size: 0.9em;">Select a request or search by ID to review details.</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="bonafide-preview" class="bonafide-right" style="flex: 0 0 35%; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; background: var(--card-bg);">
            <div class="preview-header-modern no-print">
                <div class="preview-header-title">
                    <div class="preview-header-icon">📄</div>
                    <div class="preview-header-text">
                        <h3>Document Preview</h3>
                        <p>Live certificate view</p>
                    </div>
                </div>
                <div class="preview-controls" id="bonafide-zoom-controls" style="display: none;">
                    <div class="zoom-control">
                        <img src="{% static 'images/ZOOM_OUT.jpeg' %}" onclick="zoomOut()" alt="Zoom Out" title="Zoom Out">
                        <span class="zoom-level" id="zoom-level">100%</span>
                        <img src="{% static 'images/ZOOM_IN.jpeg' %}" onclick="zoomIn()" alt="Zoom In" title="Zoom In">
                    </div>
                </div>
            </div>
            <div id="bonafide-generated-content" class="preview-container" style="flex: 1; overflow-y: auto;"></div>
        </div>
    </div>
</div>

<script>
const baseFitZoom = 0.45;
var displayZoomPercent = 100, currentZoom = baseFitZoom, currentBonafideCertNum = null, currentBonafideYear = null, currentBonafideDate = null, currentBonafideRequestId = null, currentBonafideStatus = "";

function getBonafideDetails() {
    let p = _E('bonafide_profile').value, i = _E('bonafide_id').value;
    if (!p || !i) return _P("Please select a profile and enter an ID.", "error");
    window.pendingBonafideCertNo = null; window.pendingBonafideCertNumInt = null; window.pendingBonafideDate = null; currentBonafideRequestId = null;
    _F("{% url 'student_get' %}", { planner_pk: p, planner_sk: i }).then(r => r.json()).then(d => {
        if (d.user_info) {
            let info = d.user_info, f = _E('bonafide-details-form');
            f.innerHTML = '';
            let hid = document.createElement('input'); hid.type = 'hidden'; hid.id = 'bonafide_res_profile'; hid.value = p; f.appendChild(hid);
            const aF = (lbl, id, val) => {
                let r = document.createElement('div'); r.className = 'fee-entry-row';
                let l = document.createElement('label'); l.className = 'fee-label-styled'; l.style.width = '60px'; l.textContent = lbl;
                let inP = document.createElement('input'); inP.type = 'text'; inP.id = id; inP.className = 'textBoxClass fee-input-styled'; inP.value = val || ''; inP.readOnly = true; inP.style.cssText = 'flex: 1; text-align: left; width: auto;';
                r.append(l, inP); f.appendChild(r);
            };
            aF('Name', 'bonafide_name', info.name); 
            aF('ID', 'bonafide_sk', info.planner_sk); 
            aF('EMIS No', 'bonafide_emis', info.emis); 
            aF('Standard', 'bonafide_std', info.std); 
            aF('DOJ', 'bonafide_doj', info.doj); 
            aF('DOL', 'bonafide_dol', info.dol);
            
            let ab = document.createElement('div'); ab.className = 'action-buttons';
            let bGen = document.createElement('button'); bGen.type = 'button'; bGen.className = 'sidebar-link active'; bGen.id = 'btn-prepare-b'; bGen.onclick = generateBonafide; bGen.textContent = 'Generate';
            ab.appendChild(bGen);
            
            let bBtns = document.createElement('div'); bBtns.id = 'bonafide-btns'; bBtns.style.cssText = 'display:none; flex-direction:column; gap:10px; width:100%;';
            let r1 = document.createElement('div'); r1.style.cssText = 'display:flex; gap:15px; width:100%;';
            let btnSave = document.createElement('button'); btnSave.className = 'sidebar-link active'; btnSave.onclick = saveBonafide; btnSave.id = 'btn-save-record-b'; btnSave.style.cssText = 'flex:1; margin:0; background: #10b981;'; btnSave.title = 'Save Record'; btnSave.textContent = 'Save';
            let btnPdf = document.createElement('button'); btnPdf.className = 'sidebar-link active'; btnPdf.onclick = saveBonafidePDF; btnPdf.id = 'btn-pdf-b'; btnPdf.style.cssText = 'display:none; flex:1; margin:0; background: #f59e0b;'; btnPdf.title = 'Download PDF'; btnPdf.textContent = 'Print';
            r1.appendChild(btnSave); r1.appendChild(btnPdf);
            
            let r2 = document.createElement('div'); r2.style.cssText = 'display:flex; gap:15px; width:100%;';
            let btnSigned = document.createElement('button'); btnSigned.className = 'sidebar-link active'; btnSigned.onclick = markBonafideSigned; btnSigned.id = 'btn-signed-b'; btnSigned.style.cssText = 'display:none; flex:1; margin:0; background: #06b6d4;'; btnSigned.title = 'Mark as Signed'; btnSigned.textContent = 'Signed';
            let btnReset = document.createElement('button'); btnReset.className = 'sidebar-link active'; btnReset.onclick = resetBonafidePage; btnReset.id = 'btn-reset-b'; btnReset.style.cssText = 'flex:1; margin:0; background: #6b7280;'; btnReset.title = 'Reset'; btnReset.textContent = 'Reset';
            r2.appendChild(btnSigned); r2.appendChild(btnReset);
            bBtns.appendChild(r1); bBtns.appendChild(r2);
            ab.appendChild(bBtns);
            f.appendChild(ab);

            if (info.bonafide && info.bonafide.length > 0) {
                let hd = document.createElement('div'); hd.style.marginTop = '20px';
                let ph = document.createElement('div'); ph.className = 'panel-header'; ph.style.cssText = 'font-size: 1em; border-bottom: 1px solid #014458;'; ph.textContent = 'History';
                hd.appendChild(ph);
                let tb = document.createElement('table'); tb.className = 'styled-table'; tb.style.fontSize = '0.8em';
                tb.innerHTML = '<thead><tr><th style="padding: 5px;">Cert Num</th><th style="padding: 5px;">Date Issued</th><th style="padding: 5px;">Generated By</th><th style="padding: 5px;">Std</th></tr></thead>';
                let tbody = document.createElement('tbody');
                [...info.bonafide].reverse().forEach(c => {
                    let tr = document.createElement('tr');
                    let td1 = document.createElement('td'); td1.style.padding = '4px'; td1.textContent = c.cert_no || '-';
                    let td2 = document.createElement('td'); td2.style.padding = '4px'; td2.textContent = c.dateIssued || c.date || '-';
                    let td3 = document.createElement('td'); td3.style.padding = '4px'; td3.textContent = c.generated_by || '-';
                    let td4 = document.createElement('td'); td4.style.padding = '4px'; td4.textContent = c.std || '-';
                    tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3); tr.appendChild(td4);
                    tbody.appendChild(tr);
                });
                tb.appendChild(tbody);
                hd.appendChild(tb);
                f.appendChild(hd);
            }
        } else {
            _P("User not found.", "error");
        }
    }).catch(e => _P("An error occurred while fetching details.", "error"));
}

function generateBonafide() {
    displayZoomPercent = 100; currentZoom = baseFitZoom;
    let M = JSON.parse(_E('bonafide-msg-data').textContent) || {}, p = _E('bonafide_res_profile').value;
    if (!p || !M[p]) return _P("Message template not found for selected profile.", "error");
    if (window.pendingBonafideCertNumInt) r(window.pendingBonafideCertNumInt, window.pendingBonafideDate);
    else {
        _F("{% url 'student_get' %}", { planner_pk: "bonafide_num" }).then(r => r.json()).then(d => { r((d.success && d.next_num) ? d.next_num : 1, null) }).catch(e => _P("Error retrieving certificate number: " + e, "error"));
    }
    function r(C, D) {
        currentBonafideCertNum = C;
        let m = M[p], n = _E('bonafide_name').value, i = _E('bonafide_sk').value, e = _E('bonafide_emis').value, s = _E('bonafide_std').value, j = _E('bonafide_doj').value, l = _E('bonafide_dol').value, S = "{{ schoolInformation.schoolName }}", t = new Date(), cM = t.getMonth() + 1, cY = t.getFullYear(), aY = cM >= 6 ? `${cY}-${cY + 1}` : `${cY - 1}-${cY}`, f = D;
        if (!f) { let d = String(t.getDate()).padStart(2, '0'), mo = String(t.getMonth() + 1).padStart(2, '0'); f = `${d}/${mo}/${cY}`; }
        currentBonafideDate = f; currentBonafideYear = cY;
        
        let sanitize = str => String(str).replace(/[&<>'"]/g, match => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[match]));
        let sn = sanitize(n), si = sanitize(i), se = sanitize(e), ss = sanitize(s), sj = sanitize(j), sl = sanitize(l);
        
        m = m.replace('[Name]', `<b>${sn}</b>`).replace('[SID]', si).replace('[TID]', si);
        m = m.replace('[EMIS No: ]', se ? `EMIS No: <b>${se}</b>` : '').replace('[School Name]', S);
        m = m.replace('[Class]', `<b>${ss}</b>`).replace('[Year]', aY);
        if (sl && sl.trim() !== '') m = m.replace('since [Joining Date]', `from ${sj} to ${sl}`).replace('[Joining Date]', `${sj} to ${sl}`);
        else m = m.replace('[Joining Date]', sj);
        
        let cv = document.createElement('div');
        cv.id = 'certificate-view';
        cv.className = 'watermark-bg';
        cv.style.cssText = `background-color: white; padding: 60px 80px; padding-top: 80px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); font-size: 14pt; line-height: 1.6; width: 210mm; min-height: 297mm; position: relative; margin: 40px auto; zoom: ${currentZoom};`;
        cv.innerHTML = `<div class="letterhead-bonafide"><img src="{% static 'images/Glassed_LOGO_NOBG.png' %}" class="letterhead-logo-bonafide" alt="Trust Logo"><div class="letterhead-text-bonafide"><h1 class="letterhead-title-bonafide"><b>{{schoolInformation.schoolName}}</b></h1><p class="letterhead-sub-bonafide">{{schoolInformation.schoolAddress}}</p><div class="letterhead-reg-bonafide">{{schoolInformation.schoolRegistrationNumber}}</div><div class="letterhead-contact-bonafide">Mobile: {{schoolInformation.trustMobile}} | Email: {{schoolInformation.trustEmail}}</div></div></div><div style="display: flex; justify-content: space-between; margin-bottom: 30px; margin-top: 80px; font-size: 12pt;"><div>Cert. No. : VSBC/${C}/${cY}</div><div>Date : ${f}</div></div><div style="text-align: center; font-weight: bold; text-decoration: underline; margin-bottom: 100px;">TO WHOMSOEVER IT MAY CONCERN</div><div style="text-align: justify; line-height: 2.0;"><p>${m}</p></div><div style="margin-top: 150px; text-align: right; font-weight: bold; font-size: 12px; margin-right: 20px;">Correspondent / Principal</div>`;
        
        let bgc = _E('bonafide-generated-content');
        bgc.innerHTML = '';
        bgc.appendChild(cv);

        _E('zoom-level').innerText = displayZoomPercent + '%';
        if (_E('bonafide-zoom-controls')) _E('bonafide-zoom-controls').style.display = 'flex';
        if (_E('bonafide-btns')) _E('bonafide-btns').style.display = 'flex';
        if (_E('btn-prepare-b')) _E('btn-prepare-b').style.display = 'none';
        if (_E('btn-save-record-b')) _E('btn-save-record-b').style.display = 'block';
        if (_E('btn-pdf-b')) _E('btn-pdf-b').style.display = 'none';
        if (_E('btn-signed-b')) _E('btn-signed-b').style.display = 'none';
    }
}

function saveBonafide() {
    if (!currentBonafideCertNum) return _P("Please generate a certificate first.", "error");
    let p = {
        profile: _E('bonafide_res_profile').value, id: _E('bonafide_sk').value, name: _E('bonafide_name').value,
        emis: _E('bonafide_emis').value, std: _E('bonafide_std').value, doj: _E('bonafide_doj').value,
        dol: _E('bonafide_dol').value, date: currentBonafideDate, cert_num_int: currentBonafideCertNum,
        cert_no: `VSBC/${currentBonafideCertNum}/${currentBonafideYear}`, generated_by: "{{ request.session.user.user }}",
        req_id: currentBonafideRequestId
    };
    _F("{% url 'save_bonafide' %}", p).then(r => r.json()).then(d => {
        if (d.success) {
            _P(d.message, "success");
            if (_E('btn-save-record-b')) _E('btn-save-record-b').style.display = 'none';
            if (_E('btn-pdf-b')) _E('btn-pdf-b').style.display = 'block';
            if (currentBonafideRequestId) {
                _F("{% url 'approve_voucher' %}", { item_id: currentBonafideRequestId, action: 'Saved', type: 'Bonafide' }).then(() => {
                    if (typeof fetchPendingVouchers === "function") fetchPendingVouchers();
                });
            }
        } else _P("Error saving: " + d.error, "error");
    }).catch(e => _P("Network Error: " + e, "error"));
}

function saveBonafidePDF() {
    let { jsPDF: j } = window.jspdf, e = _E("certificate-view");
    if (!e) return;
    html2canvas(e, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(c => {
        let p = new j('p', 'mm', 'a4');
        p.addImage(c.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, p.internal.pageSize.getWidth(), p.internal.pageSize.getHeight());
        p.save(`${currentBonafideCertNum ? `VSBC_${currentBonafideCertNum}` : "BONAFIDE"}.pdf`);
        if (currentBonafideRequestId && _E('btn-signed-b')) _E('btn-signed-b').style.display = 'block';
        _P("After saving the PDF, please click the 'Signed' button to finalize the record.", "success");
    });
}

function markBonafideSigned() {
    if (!currentBonafideRequestId) return;
    if (!confirm("Once marked as Signed, this record cannot be modified or downloaded again. Continue?")) return;
    _F("{% url 'approve_voucher' %}", { item_id: currentBonafideRequestId, action: 'Signed', type: 'Bonafide' }).then(r => r.json()).then(d => {
        if (d.success) {
            _P("Bonafide record successfully marked as Signed", "success");
            if (typeof fetchPendingVouchers === "function") fetchPendingVouchers();
            if (_E('bonafide-btns')) _E('bonafide-btns').style.display = 'none';
            if (_E('bonafide-zoom-controls')) _E('bonafide-zoom-controls').style.display = 'none';
            _E('bonafide-generated-content').innerHTML = '';
        } else _P(d.error, "error");
    }).catch(e => _P("Error updating status", "error"));
}

function resetBonafidePage() {
    let i = _E('bonafide_id'); if (i) i.value = '';
    let f = _E('bonafide-details-form');
    f.innerHTML = '';
    let p = document.createElement('div');
    p.style.cssText = 'text-align: center; padding: 40px 20px; color: #a0aec0; background: var(--card-bg); border-radius: 12px; border: 2px dashed var(--border-color);';
    let span = document.createElement('p');
    span.style.fontSize = '0.9em';
    span.textContent = 'Select a request or search by ID to review details.';
    p.appendChild(span);
    f.appendChild(p);
    
    _E('bonafide-generated-content').innerHTML = '';
    if (_E('bonafide-btns')) _E('bonafide-btns').style.display = 'none';
    if (_E('bonafide-zoom-controls')) _E('bonafide-zoom-controls').style.display = 'none';
    currentBonafideCertNum = null; currentBonafideRequestId = null;
    window.pendingBonafideCertNo = null; window.pendingBonafideCertNumInt = null; window.pendingBonafideDate = null;
    _P("Bonafide Manager Reset.", "success");
}

function zoomIn() {
    displayZoomPercent += 10;
    currentZoom = baseFitZoom * (displayZoomPercent / 100);
    let v = _E('certificate-view');
    if (v) v.style.zoom = currentZoom;
    _E('zoom-level').innerText = displayZoomPercent + '%';
}

function zoomOut() {
    if (displayZoomPercent > 10) {
        displayZoomPercent -= 10;
        currentZoom = baseFitZoom * (displayZoomPercent / 100);
        let v = _E('certificate-view');
        if (v) v.style.zoom = currentZoom;
        _E('zoom-level').innerText = displayZoomPercent + '%';
    }
}
</script>
