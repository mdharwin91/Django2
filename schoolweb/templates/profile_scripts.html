<script>
var _E=i=>document.getElementById(i),_S=q=>document.querySelectorAll(q),_P=(m,t)=>SchoolUtils.showPopup(m,t),_F=(u,b)=>fetch(u,{method:"POST",headers:{"Content-Type":"application/json","X-CSRFToken":"{{ csrf_token }}"},body:JSON.stringify(b)});
function fetchPasswordResetRequests(){fetch("{% url 'get_password_resets' %}").then(r=>r.json()).then(d=>{let l=_E('pwd-reset-list');if(d.success&&d.requests&&d.requests.length>0){let h='';d.requests.forEach(r=>{let n=(r.name&&r.name!=='null'&&r.name!=='None'&&r.name.trim()!=='')?r.name:r.target_sk,t=(r.date&&r.date!=='null'&&r.date!=='None')?r.date:'N/A';if(t==='N/A'&&r.req_id){let p=r.req_id.split('_');if(p.length===3)t=new Date(parseInt(p[2])*1000).toLocaleDateString('en-GB')}h+=`<div style="border: 1px solid var(--border-color); padding: 10px; margin-bottom: 8px; border-radius: 8px; background: var(--table-even-row);"><div style="font-weight: bold; color: var(--panel-header); margin-bottom: 4px;">${n} (${r.target_sk})</div><div style="font-size: 0.85em; opacity: 0.8; margin-bottom: 8px;">Date: ${t}</div><div style="display: flex; gap: 5px;"><button type="button" class="sidebar-link active" style="margin:0; padding: 4px; font-size: 11px; flex: 1;" onclick="resolvePasswordReset('${r.req_id}', 'Reset')">Reset</button><button type="button" class="sidebar-link active" style="margin:0; padding: 4px; font-size: 11px; flex: 1; background: #6c757d;" onclick="resolvePasswordReset('${r.req_id}', 'Dismissed')">Dismiss</button></div></div>`});l.innerHTML=h}else l.innerHTML='<p style="opacity: 0.7; text-align: center; font-style: italic;">No pending requests.</p>'}).catch(e=>console.error(e))}
function resolvePasswordReset(i,a){let c=`Are you sure you want to mark this request as ${a}?`;if(a==='Reset')c=`Are you sure you want to reset the password to Default password?`;if(!confirm(c))return;_F("{% url 'resolve_password_reset' %}",{req_id:i,action:a}).then(r=>r.json()).then(d=>{if(d.success){_P(d.message,"success");fetchPasswordResetRequests()}else _P(d.error,"error")})}
function profile_student_get(p,s){p=p||_E('fetch_planner_pk').value;s=s||_E('fetch_planner_sk').value;if(!p||!s)return _P("Select profile and enter ID","error");_F("{% url 'student_get' %}",{planner_pk:p,planner_sk:s}).then(r=>{if(!r.ok)return r.json().then(e=>{throw new Error(e.error||"Server error")});return r.json()}).then(d=>{if(d.user_info){let i=d.user_info;_E('prof-placeholder').style.display='none';_E('profile-form').style.display='block';_E('profile-form').style.opacity='1';_E('profile-form').style.pointerEvents='none';_E('profile-actions').style.display='block';if(_E('edit-button'))_E('edit-button').style.display='inline-block';_E('prof-save-container').style.display='none';_E('fetch_planner_pk').disabled=true;_E('fetch_planner_sk').disabled=true;['planner_pk','planner_sk','name','std','dob','emis','doj','mobile','free_edu','age','dol','status','parent_name_only','parent_relation','address','theme','designation'].forEach(f=>{if(_E('prof-cell-'+f))_E('prof-cell-'+f).value=i[f]||''});let m=_E('prof-cell-mfa-status');if(m){if(i.mfa_enabled){m.innerText='Enabled';m.style.background='#48bb78'}else{m.innerText='Disabled';m.style.background='#a0aec0'}}let c=_E('prof-bonafide-container'),l=_E('prof-bonafide-list');if(i.bonafide&&i.bonafide.length>0&&c&&l){c.style.display='block';l.style.display='none';_E('prof-bonafide-toggle-icon').innerText='+';let h='';[...i.bonafide].reverse().forEach(b=>{let s=b.status?b.status.toLowerCase():'';let k=s.includes('signed')?'blue':s.startsWith('in progress')?'#ed8936':s.includes('pending')?'#FFD700':'#a0aec0';h+=`<div style="border-bottom: 1px solid var(--border-color); padding: 10px 0; display: flex; justify-content: space-between; align-items: center;"><div><div style="font-weight: bold; color: var(--text-main);">${b.cert_no||b.req_id||'N/A'}</div><div style="font-size: 0.85em; color: var(--text-main); opacity: 0.7;">${b.dateIssued||b.date||'N/A'} | By: ${b.generated_by||b.requested_by||'N/A'}</div></div><div><span style="font-size: 0.75em; background: ${k}; color: white; padding: 3px 8px; border-radius: 12px; text-transform: uppercase;">${b.status||'N/A'}</span></div></div>`});l.innerHTML=h}else if(c){c.style.display='none';}_E('prof-cell-planner_sk').readOnly=true;window.fetchedUserPassword=i.password||'';_P("Profile fetched. Click 'Edit' to modify.","success");toggleTeacherFields()}else{_P("Profile not found","error");profile_reset_search()}}).catch(e=>{_P(e.message,"error");profile_reset_search()})}
function profile_edit_student(){_E('profile-form').style.pointerEvents='auto';_E('prof-save-container').style.display='flex';_E('edit-button').style.display='none';_E('prof-btn-update').style.display='inline-block';_E('prof-btn-save').style.display='none';_S('#profile-form input, #profile-form select, #profile-form textarea').forEach(i=>i.addEventListener('change',()=>{let l=i.closest('.bonafide-form-row')?.querySelector('.fee-label-styled');if(l)l.classList.add('edited-label')}));_P("Editing enabled.","success")}
function profile_update_student(e){if(e)e.preventDefault();let b=_E('prof-cell-dob').value,j=_E('prof-cell-doj').value;if(b&&j){let d=new Date(b),o=new Date(j),m=new Date(d.getFullYear()+3,d.getMonth(),d.getDate());if(o<m)return _P("Error: Date of Joining must be at least 3 years after Date of Birth.","error")}_F("{% url 'student_update' %}",profile_get_form_data()).then(r=>r.json()).then(d=>{if(d.success){_P("Profile updated successfully","success");_S('.edited-label').forEach(l=>l.classList.remove('edited-label'));_E('profile-form').style.pointerEvents='none';_E('prof-save-container').style.display='none';_E('edit-button').style.display='inline-block'}else _P("Error: "+d.error,"error")})}
function profile_save_new_student(e){if(e)e.preventDefault();let b=_E('prof-cell-dob').value,j=_E('prof-cell-doj').value;if(b&&j){let d=new Date(b),o=new Date(j),m=new Date(d.getFullYear()+3,d.getMonth(),d.getDate());if(o<m)return _P("Error: Date of Joining must be at least 3 years after Date of Birth.","error")}let f=new FormData();_S('#profile-form input, #profile-form select, #profile-form textarea').forEach(i=>{if(i.name)f.append(i.name,i.value)});f.append('csrfmiddlewaretoken','{{ csrf_token }}');let p=_E('prof-cell-planner_pk').value,s=_E('prof-cell-planner_sk').value;fetch("{% url 'student_details' %}",{method:"POST",body:f}).then(r=>r.text()).then(h=>{if(h.includes("successfully")){_P("New profile saved!","success");_E('fetch_planner_pk').value=p;_E('fetch_planner_sk').value=s;profile_student_get()}else _P("Save failed. Check ID format.","error")})}
function profile_reset_student(){_E('prof-placeholder').style.display='none';_E('profile-form').style.display='block';_E('profile-form').style.opacity='1';_E('profile-form').style.pointerEvents='auto';_E('profile-actions').style.display='none';_E('prof-save-container').style.display='flex';_E('edit-button').style.display='none';_E('prof-btn-update').style.display='none';_E('prof-btn-save').style.display='inline-block';_E('profile-form').reset();_S('.edited-label').forEach(l=>l.classList.remove('edited-label'));let m=_E('prof-cell-mfa-status');if(m){m.innerText='Disabled';m.style.background='#a0aec0'}_E('prof-cell-planner_sk').readOnly=false;let c=_E('prof-bonafide-container');if(c)c.style.display='none';toggleTeacherFields()}
function profile_get_form_data(){let d={};['planner_pk','planner_sk','name','std','dob','emis','doj','mobile','free_edu','age','dol','status','parent_name_only','parent_relation','address','theme','designation'].forEach(f=>{if(_E('prof-cell-'+f))d[f]=_E('prof-cell-'+f).value});return d}
function profile_clear_view(){_E('profile-form').reset();_E('profile-form').style.display='none';_E('prof-placeholder').style.display='block';_E('profile-actions').style.display='none';_E('prof-save-container').style.display='none';_S('.edited-label').forEach(l=>l.classList.remove('edited-label'));let m=_E('prof-cell-mfa-status');if(m){m.innerText='Disabled';m.style.background='#a0aec0'}let c=_E('prof-bonafide-container');if(c)c.style.display='none';profile_reset_search()}
function profile_reset_search(){_E('fetch_planner_pk').value='';_E('fetch_planner_sk').value='';_E('fetch_planner_pk').disabled=false;_E('fetch_planner_sk').disabled=false;updateSearchPlaceholder()}
function updateSearchPlaceholder(){let p=_E('fetch_planner_pk').value||"Profile";_E('fetch_planner_sk').placeholder=p+" ID"}
function toggleTeacherFields(){let p=_E('prof-cell-planner_pk').value||"Student",k=_E('prof-lbl-planner_sk'),n=_E('prof-lbl-name');if(k)k.innerText=p+" ID";if(n)n.innerText=p+" Name";let c=_E('change-password-btn'),r=_E('reset-password-btn'),m=_E('mfa-buttons-row'),s=_E('mfa-status-container'),d=_E('prof-row-designation'),i=window.location.pathname.includes('/common');if(p==='Student'){if(c)c.style.display='none';if(r)r.style.display='none';if(m)m.style.display='none';if(s)s.style.display='none';if(d)d.style.display='none'}else if(p==='Teacher'){if(c)c.style.display=i?'block':'none';if(r)r.style.display='none';if(m)m.style.display='flex';if(s)s.style.display='flex';if(d)d.style.display='flex'}else{if(c)c.style.display=i?'block':'none';if(r)r.style.display='block';if(m)m.style.display='flex';if(s)s.style.display='flex';if(d)d.style.display='flex'}}
function openChangePasswordModal(){_E('modal-title').innerText="Change Password";_E('row_current_password').style.display='flex';_E('passwordModal').style.display='block'}
function openResetPasswordModal(){_E('modal-title').innerText="Reset Password (Admin)";_E('row_current_password').style.display='none';_E('passwordModal').style.display='block'}
function closeChangePasswordModal(){_E('passwordModal').style.display='none';_E('current_entered_password').value='';_E('new_password').value='';_E('confirm_password').value='';if(_E('mfa_otp_change'))_E('mfa_otp_change').value=''}
function submitNewPassword(){let n=_E('new_password').value,c=_E('confirm_password').value;if(!n||n!==c)return _P("Passwords mismatch","error");let p={planner_pk:_E('prof-cell-planner_pk').value,planner_sk:_E('prof-cell-planner_sk').value,password:n},r=_E('current_entered_password');if(r&&r.value)p.current_password=r.value;if(_E('mfa_otp_change'))p.otp_token=_E('mfa_otp_change').value;_F("{% url 'change_password' %}",p).then(r=>r.json()).then(d=>{if(d.success){_P("Password updated","success");closeChangePasswordModal()}else _P("Error: "+d.error,"error")})}
function calculateAge(d){if(!d)return"";let t=new Date(),b=new Date(d),a=t.getFullYear()-b.getFullYear(),m=t.getMonth()-b.getMonth();if(m<0||(m===0&&t.getDate()<b.getDate()))a--;return a>=0?a:0}
function initProfileScripts(){let d=_E('prof-cell-dob');if(d){let t=new Date(),a=new Date(t.getFullYear()-3,t.getMonth(),t.getDate());d.setAttribute('max',a.toISOString().split('T')[0]);d.addEventListener('change',function(){let a=_E('prof-cell-age');if(a){a.value=calculateAge(this.value);a.dispatchEvent(new Event('change'))}})}if(_E('pwd-reset-requests-container'))fetchPasswordResetRequests()}
function toggleBonafideHistory(){let l=_E('prof-bonafide-list'),i=_E('prof-bonafide-toggle-icon');if(l.style.display==='none'){l.style.display='block';i.innerText='-'}else{l.style.display='none';i.innerText='+'}}
function setupMFA(){let p=_E('prof-cell-planner_pk').value,s=_E('prof-cell-planner_sk').value;if(!confirm("This will generate a new 2FA secret for "+s+". Continue?"))return;_F("{% url 'setup_mfa' %}",{planner_pk:p,planner_sk:s}).then(r=>r.json()).then(d=>{if(d.success){let q=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(d.uri)}`,m=document.createElement('div');m.style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:20000; display:flex; align-items:center; justify-content:center; flex-direction:column; color:white;";m.innerHTML=`<div style="background:white; padding:30px; border-radius:15px; text-align:center; color:#333; max-width:400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);"><h2 style="margin-top:0; color:#014458;">MFA Setup</h2><p>1. Scan this QR code with Google Authenticator or Authy:</p><img src="${q}" style="margin:10px 0; border:1px solid #ccc; padding:10px; border-radius:8px;"><p style="font-size:0.85em; margin-bottom:15px;">Manual Secret: <code style="background:#f4f4f4; padding:2px 5px; border-radius:3px; color:#764ba2; font-weight:bold;">${d.secret}</code></p><p>2. Enter the 6-digit code from your app to verify:</p><input type="text" id="mfa_otp_verify" class="textBoxClass" placeholder="000000" maxlength="6" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '');" style="width:100%; text-align:center; font-size:1.5em; margin-bottom:20px; letter-spacing:5px;"><div style="display:flex; gap:10px;"><button id="btn-verify-mfa" class="sidebar-link active" style="margin:0; flex:1;">Verify & Enable</button><button onclick="this.parentElement.parentElement.parentElement.remove()" class="sidebar-link active" style="margin:0; flex:1; background:#6c757d;">Cancel</button></div></div>`;document.body.appendChild(m);_E('btn-verify-mfa').onclick=function(){let t=_E('mfa_otp_verify').value;if(!t)return alert("Please enter the code");_F("{% url 'setup_mfa' %}",{planner_pk:p,planner_sk:s,otp_token:t,secret:d.secret}).then(r=>r.json()).then(v=>{if(v.success){_P(v.message,"success");m.remove();let b1=_E('common-mfa-badge');if(b1){b1.innerText='Enabled';b1.style.background='#48bb78'}let b2=_E('prof-cell-mfa-status');if(b2){b2.innerText='Enabled';b2.style.background='#48bb78'}}else _P(v.error,"error")})}}else _P(d.error,"error")})}
function verifyMFA(){let p=_E('prof-cell-planner_pk').value,s=_E('prof-cell-planner_sk').value,t=prompt("Enter 6-digit code from your app to verify:");if(!t)return;if(!/^\d{6}$/.test(t))return alert("Please enter exactly 6 digits.");_F("{% url 'setup_mfa' %}",{planner_pk:p,planner_sk:s,action:'verify',otp_token:t}).then(r=>r.json()).then(d=>{if(d.success)_P(d.message,"success");else _P(d.error,"error")})}
function removeMFA(){let p=_E('prof-cell-planner_pk').value,s=_E('prof-cell-planner_sk').value;if(!confirm("Are you sure you want to REMOVE MFA for "+s+"?"))return;_F("{% url 'setup_mfa' %}",{planner_pk:p,planner_sk:s,action:'remove'}).then(r=>r.json()).then(d=>{if(d.success){_P(d.message,"success");let b1=_E('common-mfa-badge');if(b1){b1.innerText='Disabled';b1.style.background='#a0aec0'}let b2=_E('prof-cell-mfa-status');if(b2){b2.innerText='Disabled';b2.style.background='#a0aec0'}}else _P(d.error,"error")})}
</script>
