{% load static %}
<style>
    .fixed-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: var(--card-bg, #fff8f0);
        z-index: 2000;
        display: flex;
        align-items: center;
        padding: 10px 40px;
        box-sizing: border-box;
        box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        border-bottom: 3px solid var(--panel-header, #014458);
    }
    .header-logo {
        width: 110px;
        height: 110px;
        flex-shrink: 0;
        display: block;
        object-fit: contain;
    }
    .header-text {
        flex-grow: 1;
        text-align: center;
        padding-right: 110px; /* Compensate for logo width to center text on screen */
    }
    .header-title { 
        font-size: 45px; 
        margin: 0; 
        line-height: 1.2; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .header-sub { font-size: 16px; color: var(--text-main, #333); margin: 5px 0; }
    .header-reg { font-size: 13px; color: var(--text-main, #666); opacity: 0.8; font-weight: bold; } 
    .header-spacer { height: 132px; }

    @media (max-width: 768px) {
        .fixed-header {
            flex-direction: row;
            padding: 10px 15px;
        }
        .header-logo { width: 60px; height: 60px; }
        .header-text { padding-right: 60px; }
        .header-title { font-size: 20px; }
        .header-sub { font-size: 12px; }
        .header-reg { font-size: 10px; }
        .header-spacer { height: 85px; }
    }
</style>

<div class="fixed-header">
    <img src="{% static 'images/Glassed_LOGO_NOBG.png' %}" class="header-logo" alt="Trust Logo">
    <div class="header-text">
        <h1 class="header-title"><b>{{schoolInformation.trustName}}</b></h1>
        <p class="header-sub"><b>{{schoolInformation.trustAddress}}</b></p>
        <div class="header-reg">{{schoolInformation.trustRegistrationNumber}} | {{schoolInformation.trustEmail}} | {{schoolInformation.trustMobile}}</div>
    </div>
</div>
<div class="header-spacer"></div>
